<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="login-container">

  <div class="login-card">

    <h1>Creator OS</h1>

    <input id="email" type="email" placeholder="Email"><br><br>
    <input id="password" type="password" placeholder="Password"><br><br>

    <button id="loginBtn">Login</button>
    <button id="signupBtn">Signup</button>
<p id="forgotPassword" style="color:#4da6ff; cursor:pointer; margin-top:10px;">
  Forgot Password?
</p>
  </div>

</div>
<script>
alert("Login page loaded");
</script>
<script type="module">
import {
  auth,
  signInWithEmailAndPassword,
  createUserWithEmailAndPassword,
  sendPasswordResetEmail
} from "./firebase.js";

// LOGIN
document.getElementById("loginBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter email and password.");
    return;
  }

  try {
    const userCredential = await signInWithEmailAndPassword(auth, email, password);

    alert("Login Successful ✅");

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 500);

  } catch (e) {
    console.error(e);
    alert("Login Failed!\n\n" + e.message);
  }
});

// SIGNUP
document.getElementById("signupBtn").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!email || !password) {
    alert("Please enter email and password.");
    return;
  }

  if (password.length < 6) {
    alert("Password must be at least 6 characters.");
    return;
  }

  try {
    await createUserWithEmailAndPassword(auth, email, password);
    alert("Account Created Successfully ✅\nNow Login.");
  } catch (e) {
    console.error(e);
    alert("Signup Failed!\n\n" + e.message);
  }
});

// FORGOT PASSWORD
document.getElementById("forgotPassword").addEventListener("click", async () => {

  const email = document.getElementById("email").value.trim();

  if (!email) {
    alert("Please enter your email first.");
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);
    alert("Password reset email sent ✅");
  } catch (e) {
    console.error(e);
    alert(e.message);
  }
});
</script>

</body>
</html>
