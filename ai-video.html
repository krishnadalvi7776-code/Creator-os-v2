<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Video Generator - Creator OS</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="ai-video.css">

</head>

<body>

<div class="video-page">

<h1>🎬 AI Video Generator</h1>

<p>Create amazing AI videos with Creator OS</p>


<div class="video-box">

<label>Enter Video Prompt</label>

<textarea id="videoPrompt" placeholder="Example: A futuristic city with flying cars"></textarea>


<label>Select Video Style</label>

<div class="video-options">

<select id="videoStyle">

<option>Cinematic</option>
<option>Realistic</option>
<option>Anime</option>
<option>3D Animation</option>

</select>

</div>

<button id="generateVideoBtn">
🚀 Generate Video
</button>


<div id="videoStatus">
Ready to generate your AI video.
</div>


<div id="videoResult">

</div>


</div>

</div>

<script type="module" src="ai-video.js"></script>


</body>

</html>
